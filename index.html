<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L.T. Rubber - Advanced Dashboard</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --success: #10b981; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        body { font-family: 'Inter', 'Kanit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Header Section */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #94a3b8; margin-right: 5px; }
        .connected { background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* Dashboard Layout */
        .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        .card { background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Real-time Display */
        .rt-value { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .label { font-size: 0.85rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Filter Section */
        .filter-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        input[type="date"] { padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; width: 100%; box-sizing: border-box; }
        .btn-search { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-search:hover { background: #1d4ed8; }

        /* Chart Section */
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .mode-badge { font-size: 11px; padding: 4px 10px; border-radius: 12px; background: #e0f2fe; color: #0369a1; font-weight: 700; }
        .chart-area { height: 450px; position: relative; }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size: 1.5rem;">L.T. Rubber Smart Room</h1>
            <p style="margin:5px 0 0; color: #64748b; font-size: 0.9rem;">ระบบติดตามและควบคุมอุณหภูมิอัจฉริยะ</p>
        </div>
        <div id="status-box"><span id="dot" class="status-dot"></span> <small id="status-text">MQTT: Offline</small></div>
    </header>

    <div class="main-grid">
        <div class="card">
            <div class="label"><i class="fas fa-thermometer-half"></i> Real-time Temp</div>
            <div class="rt-value"><span id="temp-val">--</span><span style="font-size: 1.5rem;">°C</span></div>
            
            <div class="label"><i class="fas fa-tint"></i> Humidity</div>
            <div class="rt-value" style="color: var(--success); font-size: 2.5rem;"><span id="humid-val">--</span><span style="font-size: 1rem;">%</span></div>

            <div class="filter-group">
                <div class="label"><i class="fas fa-history"></i> เลือกดูย้อนหลัง</div>
                <div style="font-size: 12px;">จากวันที่:</div>
                <input type="date" id="startDate">
                <div style="font-size: 12px;">ถึงวันที่:</div>
                <input type="date" id="endDate">
                <button class="btn-search" onclick="fetchHistoryRange()">
                    <i class="fas fa-sync-alt"></i> ดึงข้อมูลย้อนหลัง
                </button>
                <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size: 12px; margin-top:10px;">กลับไปโหมด Real-time</button>
            </div>
        </div>

        <div class="card">
            <div class="chart-header">
                <div class="label">Temperature Trend</div>
                <div id="chart-mode" class="mode-badge">MODE: REAL-TIME</div>
            </div>
            <div class="chart-area">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    // --- ตั้งค่า NETPIE 2020 ---
    const config = {
        host: 'wss://broker.netpie.io:443/mqtt',
        clientId: '18d3ffa4-5225-4254-be45-602d8a4d7a61',
        username: '1wNXhKsEB8taY2k2MmwvJosQi923CxNC',
        password: 'CJ99D~-PLmEa~l)OHFJkDRL8T8vWjCzi',
        token: '1wNXhKsEB8taY2k2MmwvJosQi923CxNC',
        secret: 'CJ99D~-PLmEa~l)OHFJkDRL8T8vWjCzi'
    };

    let isHistoryMode = false;

    // --- เริ่มต้นกราฟ ---
    const ctx = document.getElementById('mainChart').getContext('2d');
    const mainChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Temperature (°C)',
                data: [],
                borderColor: '#2563eb',
                backgroundColor: 'rgba(37, 99, 235, 0.1)',
                borderWidth: 3,
                pointRadius: 2,
                fill: true,
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { display: false } },
                y: { min: 0, max: 100 }
            }
        }
    });

    // --- เชื่อมต่อ MQTT สำหรับ Real-time ---
    const client = mqtt.connect(config.host, config);

    client.on('connect', () => {
        document.getElementById('dot').classList.add('connected');
        document.getElementById('status-text').innerText = 'MQTT: Online';
        client.subscribe('@shadow/data/updated');
    });

    client.on('message', (topic, payload) => {
        if (isHistoryMode) return; // ถ้าดูย้อนหลังอยู่ ไม่ต้องอัปเดตกราฟ real-time

        const res = JSON.parse(payload.toString());
        const data = res.data;

        if(data.Temperature) {
            document.getElementById('temp-val').innerText = data.Temperature.toFixed(1);
            document.getElementById('humid-val').innerText = data.Humidity.toFixed(1);

            // อัปเดตกราฟแบบ Real-time (โชว์ 20 จุดล่าสุด)
            if (mainChart.data.labels.length > 20) {
                mainChart.data.labels.shift();
                mainChart.data.datasets[0].data.shift();
            }
            mainChart.data.labels.push(new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
            mainChart.data.datasets[0].data.push(data.Temperature);
            mainChart.update('none');
        }
    });

    // --- ฟังก์ชันดึงข้อมูลย้อนหลังตามช่วงวันที่ (History Range) ---
    async function fetchHistoryRange() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;

        if (!start || !end) return alert("กรุณาเลือกวันที่ให้ครบทั้ง 'จากวันที่' และ 'ถึงวันที่'");

        const startTime = new Date(start + "T00:00:00").getTime();
        const endTime = new Date(end + "T23:59:59").getTime();

        if (startTime > endTime) return alert("วันที่เริ่มต้นต้องไม่มากกว่าวันที่สิ้นสุด");

        isHistoryMode = true;
        document.getElementById('chart-mode').innerText = "MODE: HISTORY";
        document.getElementById('chart-mode').style.background = "#ffedd5";
        document.getElementById('chart-mode').style.color = "#9a3412";

        const auth = btoa(`${config.token}:${config.secret}`);
        // ดึงข้อมูลสูงสุด 2000 จุดในช่วงที่เลือก
        const url = `https://api.netpie.io/v2/feed/data?clientid=${config.clientId}&start=${startTime}&end=${endTime}&limit=2000`;

        try {
            const response = await fetch(url, { headers: { 'Authorization': `Basic ${auth}` } });
            const result = await response.json();

            if (result.data && result.data.length > 0) {
                const sorted = result.data.reverse();
                mainChart.data.labels = sorted.map(p => new Date(p.timestamp).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'}));
                mainChart.data.datasets[0].data = sorted.map(p => p.Temperature);
                mainChart.update();
            } else {
                alert("ไม่พบข้อมูลในช่วงเวลาดังกล่าว");
            }
        } catch (e) {
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล");
        }
    }
</script>
</body>
</html>
